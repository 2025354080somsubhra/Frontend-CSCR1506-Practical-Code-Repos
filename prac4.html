<!DOCTYPE html>
<html>
<head>
    <title>Practical Button</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        button {
            background-color: blue;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;

            transition: all 0.3s ease;
        }

        button:hover {
            background-color: red;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <button>Hover Me</button>

</body>
</html>
